<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FSR - Coming Soon</title>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', sans-serif;
    }

    body {
      min-height: 100vh;
      background: radial-gradient(circle at top, #0f2e1f, #020805);
      color: #e2fbe8;
      overflow-x: hidden;
    }

    /* HERO SECTION */
    .hero {
      position: relative;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 40px 20px;
    }

    /* BACKGROUND LOGO */
    .hero::before {
      content: "";
      position: absolute;
      inset: 0;
      background: url("logo.png") center/60% no-repeat;
      opacity: 0.08;
      filter: blur(8px);
      transform: scale(1.2);
    }

    /* OVERLAY for readability */
    .hero::after {
      content: "";
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at center, rgba(0,0,0,0.3), rgba(0,0,0,0.8));
    }

    .container {
      position: relative;
      z-index: 2;
      max-width: 800px;
      animation: fadeIn 1.5s ease;
    }

    /* Language Switch */
    .lang-switch {
      position: absolute;
      top: 20px;
      right: 20px;
      z-index: 3;
      font-size: 1.5rem;
      cursor: pointer;
    }

    .lang-switch span {
      margin-left: 10px;
      opacity: 0.5;
    }

    .lang-switch span.active {
      opacity: 1;
    }

    h1 {
      font-size: 4rem;
      letter-spacing: 8px;
      color: #22c55e;
      text-shadow: 0 0 20px rgba(34, 197, 94, 0.4);
    }

    h2 {
      font-weight: 300;
      color: #86efac;
      margin-bottom: 25px;
    }

    .status {
      margin: 15px 0;
      font-size: 1rem;
      color: #bbf7d0;
    }

    .status i {
      margin-right: 8px;
      color: #22c55e;
    }

    .games {
      margin: 20px 0;
      font-size: 0.95rem;
      color: #4ade80;
    }

    .recruit {
      margin-top: 30px;
      padding: 20px;
      background: rgba(34, 197, 94, 0.08);
      border: 1px solid rgba(34, 197, 94, 0.2);
      border-radius: 12px;
      backdrop-filter: blur(10px);
    }

    .recruit i {
      font-size: 1.4rem;
      margin-bottom: 10px;
      display: block;
      color: #22c55e;
    }

    .discord-btn {
      display: inline-block;
      margin-top: 15px;
      padding: 10px 20px;
      background: #22c55e;
      color: #02140c;
      border-radius: 8px;
      text-decoration: none;
      font-weight: bold;
      transition: 0.3s;
    }

    .discord-btn:hover {
      background: #16a34a;
      transform: translateY(-2px);
    }

    footer {
      text-align: center;
      padding: 20px;
      font-size: 0.8rem;
      color: #4ade80;
    }

    footer a {
      color: #22c55e;
      text-decoration: none;
      margin: 0 10px;
    }

    @keyframes fadeIn {
      from {opacity: 0; transform: translateY(20px);}
      to {opacity: 1; transform: translateY(0);}
    }

    /* MOBILE */
    @media (max-width: 600px) {
      h1 {
        font-size: 2.5rem;
      }

      .hero::before {
        background-size: 90%;
        opacity: 0.06;
      }
    }
  </style>
</head>

<body>

  <div class="lang-switch">
    <span id="enBtn" class="active">🇬🇧</span>
    <span id="deBtn">🇩🇪</span>
  </div>

  <section class="hero">
    <div class="container">

      <h1>FSR</h1>
      <h2>Frogly Studios Racing</h2>

      <div class="status" data-en="We are currently building our team & platform"
           data-de="Wir arbeiten aktuell an unserem Team & unserer Plattform">
        <i class="fas fa-tools"></i>
        We are currently building our team & platform
      </div>

      <div class="status" data-en="We’ll hit the track soon"
           data-de="Bald geht's auf die Strecke">
        <i class="fas fa-flag-checkered"></i>
        We’ll hit the track soon
      </div>

      <div class="games">
        <i class="fas fa-gamepad"></i>
        Le Mans Ultimate • Assetto Corsa Competizione
      </div>

      <div class="recruit">
        <i class="fas fa-users"></i>

        <p data-en="Interested in sim racing?<br>We are looking for drivers – rookie or experienced!<br>Join us on Discord 🚀"
           data-de="Du hast Interesse am Sim Racing?<br>Wir suchen Fahrer – egal ob Rookie oder erfahren!<br>Melde dich bei uns im Discord 🚀">
          Interested in sim racing?<br>
          We are looking for drivers – rookie or experienced!<br>
          Join us on Discord 🚀
        </p>

        <a href="https://discord.gg/7nuJgPnZTT" target="_blank" class="discord-btn"
           data-en="Join Discord"
           data-de="Discord beitreten">
          <i class="fab fa-discord"></i> Join Discord
        </a>
      </div>

    </div>
  </section>

  <footer>
    <a href="https://discord.gg/7nuJgPnZTT" target="_blank">
      <i class="fab fa-discord"></i> Discord
    </a> |
    <a href="https://frogly.fun/#legal" target="_blank">
      <i class="fas fa-scale-balanced"></i> Legal
    </a>
  </footer>

  <script>
    const enBtn = document.getElementById("enBtn");
    const deBtn = document.getElementById("deBtn");

    function switchLang(lang) {
      document.querySelectorAll("[data-en]").forEach(el => {
        el.innerHTML = el.getAttribute("data-" + lang);
      });

      enBtn.classList.toggle("active", lang === "en");
      deBtn.classList.toggle("active", lang === "de");
    }

    enBtn.onclick = () => switchLang("en");
    deBtn.onclick = () => switchLang("de");
  </script>

</body>
</html>
